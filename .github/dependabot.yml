# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  ######################################
  # ROOT / TOOLING
  ######################################

  # Rust workspace (all crates share dependencies from root Cargo.toml)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python - root pyproject.toml (tooling dependencies)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: github-actions
    # This actually targets ./.github/workflows/
    # See https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference#directories-or-directory--
    directory: "/"
    schedule:
      interval: monthly

  ######################################
  # PYTHON PACKAGES
  ######################################

  - package-ecosystem: "pip"
    directory: "packages/py/citry_core"
    schedule:
      interval: weekly
