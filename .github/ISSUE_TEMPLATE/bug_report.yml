name: Bug report
description: Something in citry or citry-core behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search existing issues first.
  - type: input
    id: version
    attributes:
      label: Version
      description: The installed versions (e.g. from `pip show citry citry-core`).
      placeholder: "citry 0.1.0, citry-core 1.3.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal component or template that triggers the problem, plus the input and the rendered output.
      render: python
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Python version and operating system.
      placeholder: "Python 3.13, macOS 15"
    validations:
      required: false
