# Run repo-wide tests, e.g. pre-commit hooks
name: Repo tests

on:
  # No path filters - this workflow runs on ALL changes to ensure repo-wide
  # quality checks (e.g. pre-commit hooks) are always executed.
  push:
    branches:
      - "main"
      - "dev"
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v5
        with:
          # Initialize Ruff submodule
          submodules: recursive

      # NOTE: The pre-commit hooks are defined as Python scripts.
      # So we need to install Python dependencies.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          uv sync --extra ci

      # Lint with pre-commit hooks (requires Python & CI dependencies)
      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit checks
        run: |
          uv run pre-commit run --all-files
