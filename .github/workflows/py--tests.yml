# Run tests for all Python packages
name: Python tests

on:
  push:
    branches:
      - "main"
      - "dev"
    # Run Python tests when any of following changes:
    # - Python code
    # - Rust code (because some Python packages depend on Rust crates)
    # - Workflows themselves (e.g. this file)
    # - Third-party dependencies (e.g., Ruff submodule) used by both Rust and Python
    # - Submodule configuration changes (e.g. .gitmodules)
    paths:
      - "packages/py/**"
      - "crates/**"
      - "third_party/**"
      - ".github/**"
      - ".gitmodules"
  pull_request:
    paths:
      - "packages/py/**"
      - "crates/**"
      - "third_party/**"
      - ".github/**"
      - ".gitmodules"
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest]
        # macOS is a smoke pair (oldest + newest Python) rather than the full
        # matrix, since macOS runners are costly and the maintainer develops on
        # darwin. The publish workflow builds the full macOS wheel set.
        include:
          - { os: macos-latest, python-version: "3.10" }
          - { os: macos-latest, python-version: "3.14" }

    steps:
      - uses: actions/checkout@v6
        with:
          # Initialize the vendored Ruff submodule (a build/runtime dependency)
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Rust is needed because `uv sync` builds the citry_core extension through
      # the maturin backend, so the toolchain must be in place before the sync.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          # NOTE: keep in step with rust-toolchain.toml
          toolchain: nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # One command builds citry_core (maturin) and installs citry editable,
      # plus every package's dev group, from the locked workspace.
      - name: Install the workspace
        run: uv sync --locked --all-packages

      - name: Run Python tests
        run: uv run --no-sync pytest
