# Publish workflow for the citry-core Python package.
# Builds and publishes citry-core to PyPI when a `citry-core@<version>` tag is
# pushed (the version after `@` must match the package's pyproject version).
#
# Originally generated by maturin v1.8.1, then customized for per-package tagging.
name: Publish citry-core to PyPI

on:
  push:
    tags:
      # Tags for this package only, e.g. citry-core@1.3.0. A bare (no language
      # prefix) tag means the Python package; see docs/codebase.md "Versioning, tags and releases".
      - "citry-core@*"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIR: packages/py/citry_core

jobs:
  # Fail fast if the tag's version does not match the package's pyproject
  # version (the release job needs this, so a mismatch blocks the publish).
  # Skipped cleanly on manual workflow_dispatch, which has no version tag.
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#citry-core@}"
          pkg_version=$(grep -m1 '^version' "$PROJECT_DIR/pyproject.toml" | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag version: $tag_version, pyproject version: $pkg_version"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag '$tag_version' does not match $PROJECT_DIR/pyproject.toml version '$pkg_version'"
            exit 1
          fi

  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
          - runner: ubuntu-latest
            target: s390x
          - runner: ubuntu-latest
            target: ppc64le
    steps:
      - uses: actions/checkout@v7
        with:
          # Initialize Ruff submodule
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --strip --out dist --find-interpreter
          sccache: "true"
          manylinux: auto
          working-directory: ${{ env.PROJECT_DIR }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: ${{ env.PROJECT_DIR }}/dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
    steps:
      - uses: actions/checkout@v7
        with:
          # Initialize Ruff submodule
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --strip --out dist --find-interpreter
          sccache: "true"
          manylinux: musllinux_1_2
          working-directory: ${{ env.PROJECT_DIR }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: ${{ env.PROJECT_DIR }}/dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
    steps:
      - uses: actions/checkout@v7
        with:
          # Initialize Ruff submodule
          submodules: recursive
      # Explicitly install all supported versions of Python on Windows.
      # Otherwise, as of Jan 2026, if we installed only Python 3.14,
      # then the Windows runner would NOT generate wheels for Python 3.8.
      # See https://github.com/django-components/djc-core/issues/22
      # And https://pypi.org/project/djc-core-html-parser/1.0.3/#files
      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          architecture: ${{ matrix.platform.target }}
      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: ${{ matrix.platform.target }}
      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.platform.target }}
      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.platform.target }}
      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --strip --out dist --find-interpreter
          sccache: "true"
          working-directory: ${{ env.PROJECT_DIR }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: ${{ env.PROJECT_DIR }}/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v7
        with:
          # Initialize Ruff submodule
          submodules: recursive
      # Explicitly install all supported versions of Python on macOS.
      # Otherwise, as of Jan 2026, if we installed only Python 3.14,
      # then the macOS runner would NOT generate wheels for Python 3.8, 3.9, 3.10.
      # See https://github.com/django-components/djc-core/issues/22
      # And https://pypi.org/project/djc-core/1.1.0/#files
      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --strip --out dist --find-interpreter
          sccache: "true"
          working-directory: ${{ env.PROJECT_DIR }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: ${{ env.PROJECT_DIR }}/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Initialize Ruff submodule
          submodules: recursive
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: ${{ env.PROJECT_DIR }}
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: ${{ env.PROJECT_DIR }}/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [verify-version, linux, musllinux, windows, macos, sdist]
    # Trusted Publishing target. Configure a PyPI publisher for this repo, the
    # workflow file py--citry-core--publish.yml, and the environment 'pypi'.
    environment: pypi
    permissions:
      # OIDC token for Trusted Publishing (no stored secret) and the attestation
      id-token: write
      # Generate the build-provenance attestation
      attestations: write
      # Create the GitHub Release
      contents: write
    steps:
      # Collect every wheel and the sdist into a single dist/ directory.
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "dist/*"
      # Trusted Publishing (OIDC): no token. PyPI verifies the workflow's OIDC
      # identity against the configured publisher.
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      # No checkout in this job, so gh cannot infer the repo from a local git
      # remote; pass --repo. Idempotent: if the release already exists (created
      # in the UI, or a re-run), upload the artifacts to it instead of failing.
      - name: Create or update the GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; uploading artifacts."
            gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --generate-notes
          fi
