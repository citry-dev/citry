# Posts newly-opened pull requests to a Discord channel. No-op until the
# DISCORD_WEBHOOK_DEVELOPMENT repository secret is set.
name: Notify Discord on new PRs

on:
  # pull_request_target (not pull_request) so the run has access to repository
  # secrets even for PRs from forks.
  # https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#pull_request_target
  pull_request_target:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_DEVELOPMENT }}
    steps:
      - name: Post to Discord (development channel)
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          TITLE: ${{ github.event.pull_request.title }}
          URL: ${{ github.event.pull_request.html_url }}
          USER: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.pull_request.number }}
          TS: ${{ github.event.pull_request.created_at }}
        run: |
          payload=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg user "$USER" \
            --arg repo "$REPO" \
            --arg number "$NUMBER" \
            --arg timestamp "$TS" \
            '{
              "username": "GitHub Pull Requests",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "embeds": [
                {
                  "title": ("New pull request: " + $number + " " + $title),
                  "url": $url,
                  "color": 3066993,
                  "author": {"name": $user},
                  "footer": {"text": $repo},
                  "timestamp": $timestamp
                }
              ]
            }')
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL" | cat
