[build-system]
requires = ["maturin>=1.8,<2.0"]
build-backend = "maturin"

[project]
name = "citry_core"
version = "1.3.0"
requires-python = ">=3.10, <4.0"
description = "Singular Python API for Rust code used by Citry"
keywords = [
    "citry",
    "frontend",
    "html",
    "web development",
    "templating",
    "template engine",
]
readme = "README.md"
authors = [{ name = "Juro Oravec", email = "juraj.oravec.josefson@gmail.com" }]
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]
license = { text = "MIT" }
dependencies = []

[dependency-groups]
dev = ["maturin>=1.10.2", "pytest>=8.3.5"]

# See https://docs.pypi.org/project_metadata/#icons
[project.urls]
Homepage = "https://github.com/JuroOravec/citry/"
Changelog = "https://github.com/JuroOravec/citry/blob/main/CHANGELOG.md"
Issues = "https://github.com/JuroOravec/citry/issues"
Donate = "https://github.com/sponsors/JuroOravec"

[tool.maturin]
features = ["pyo3/extension-module"]
# The Rust crate these bindings build from.
manifest-path = "../../../crates/citry_core_py/Cargo.toml"
# module-name sets `<python_package>.<rust_module>` for the compiled extension.
# Without it, maturin names the wheel's module dir after the Rust crate
# (`citry_core_py`), forcing the Python package and the crate to share a name.
# We keep them distinct: the package publishes as `citry_core`, the crate stays
# `citry_core_py` (leaving room for siblings like `citry_core_js`). So the binary
# lands at `citry_core/_rust` and merges with our ./citry_core/ Python tree
# (py.typed and .pyi files included).
# See https://www.maturin.rs/project_layout.html#mixed-rustpython-project
module-name = "citry_core._rust"
