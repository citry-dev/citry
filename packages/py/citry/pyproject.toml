[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "citry"
version = "0.2.0"
requires-python = ">=3.10, <4.0"
description = "Fast, simple, and smart frontend framework for Python that brings the best of Vue, React, Django, and Jinja"
# Symlink to the repo-root README; setuptools refuses a readme outside the
# package dir, so the link makes the root README local to this package.
readme = "README.md"
keywords = [
    "citry",
    "components",
    "frontend",
    "html",
    "web development",
    "templating",
    "template engine",
]
authors = [{ name = "Juro Oravec", email = "juraj.oravec.josefson@gmail.com" }]
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
license = { text = "MIT" }
dependencies = [
    "citry-core>=1.3.0",
    "wrapt>=1.16",
    "markupsafe>=2.1",
    "typing-extensions>=4.4",
]

# Optional runtime extras, namespaced `<category>-<name>` (see docs/codebase.md).
# `watcher-*` are hot-reload file-watcher backends (docs/design/hot_reload.md);
# the polling fallback in citry.reload needs no extra.
[project.optional-dependencies]
watcher-watchfiles = ["watchfiles>=1.0"]   # recommended native backend
watcher-watchdog = ["watchdog>=4.0"]       # alternate native backend

# The `citry` console script (the CLI entry point); see citry/__main__.py.
[project.scripts]
citry = "citry.__main__:main"

# These groups are the single declaration of citry's test and benchmark deps.
# The uv workspace installs them on `uv sync --all-packages`, so the shared venv
# and CI get them with no separate root-level copy to keep in step.
[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "pytest-cov>=5",   # coverage gate in scripts/check.py
    "pydantic>=2.0",   # test-only: components may use Pydantic Kwargs/Slots
    "fastapi>=0.110",  # test-only: FastAPI contrib tests (Starlette TestClient)
    "httpx>=0.27",     # TestClient needs httpx
]
# Browser end-to-end tests (tests/e2e). A separate group, NOT installed by
# default, so the normal test run skips them (they need browser binaries from
# `playwright install`). The e2e CI jobs install this group and the browsers.
e2e = [
    "playwright>=1.49",
    "pytest-playwright>=0.5",
]
# Benchmark baselines (docs/design/benchmarking.md), pinned exactly so a bump is
# a deliberate re-baseline; skipped when absent (tests/conftest.py).
# django 6.0 requires Python >= 3.12, so the Django comparison baselines only
# install there; on 3.10/3.11 the suite skips them (the bare pin would otherwise
# make the whole workspace unresolvable on those versions).
benchmark = [
    "django==6.0.6; python_version >= '3.12'",
    "django-components==0.151.1; python_version >= '3.12'",
    "jinja2==3.1.6",
]

[project.urls]
Homepage = "https://citry.dev"
Repository = "https://github.com/citry-dev/citry"
Changelog = "https://github.com/citry-dev/citry/blob/main/CHANGELOG.md"
Issues = "https://github.com/citry-dev/citry/issues"

[tool.setuptools.package-data]
# Non-Python files shipped inside the package: the type-checking marker and
# the client-side dependency manager (inlined into rendered pages, later also
# served over HTTP by the web integrations).
citry = ["py.typed", "extensions/dependencies/client/*.js"]
