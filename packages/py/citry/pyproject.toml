[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "citry"
version = "0.1.0"
requires-python = ">=3.10, <4.0"
description = "Framework-agnostic component engine for HTML templating"
keywords = [
    "citry",
    "components",
    "frontend",
    "html",
    "web development",
    "templating",
    "template engine",
]
authors = [{ name = "Juro Oravec", email = "juraj.oravec.josefson@gmail.com" }]
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
license = { text = "MIT" }
dependencies = [
    "citry-core>=1.3.0",
    "wrapt>=1.16",
    "markupsafe>=2.1",
    "typing-extensions>=4.4",
]

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    # Not a runtime dependency: users may declare Kwargs/Slots as Pydantic
    # models, so the test suite exercises that path (tests/test_pydantic.py).
    # Mirrored in the root pyproject's dev/ci extras, which are what the
    # shared monorepo venv and CI actually install from; the mirroring goes
    # away with the uv workspace conversion (issue #8).
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/JuroOravec/citry/"
Changelog = "https://github.com/JuroOravec/citry/blob/main/CHANGELOG.md"
Issues = "https://github.com/JuroOravec/citry/issues"
