[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "citry"
version = "0.1.0"
requires-python = ">=3.10, <4.0"
description = "Framework-agnostic component engine for HTML templating"
keywords = [
    "citry",
    "components",
    "frontend",
    "html",
    "web development",
    "templating",
    "template engine",
]
authors = [{ name = "Juro Oravec", email = "juraj.oravec.josefson@gmail.com" }]
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
license = { text = "MIT" }
dependencies = [
    "citry-core>=1.3.0",
    "wrapt>=1.16",
    "markupsafe>=2.1",
    "typing-extensions>=4.4",
]

# Optional runtime extras, namespaced `<category>-<name>` (see docs/codebase.md).
# `watcher-*` are hot-reload file-watcher backends (docs/design/hot_reload.md);
# the polling fallback in citry.reload needs no extra.
[project.optional-dependencies]
watcher-watchfiles = ["watchfiles>=1.0"]   # recommended native backend
watcher-watchdog = ["watchdog>=4.0"]       # alternate native backend

# The `citry` console script (the CLI entry point); see citry/__main__.py.
[project.scripts]
citry = "citry.__main__:main"

# Groups here are mirrored into the root pyproject's matching extras (dev/ci,
# benchmark), which the shared venv and CI install from; keep in sync until #8.
[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "pydantic>=2.0",   # test-only: components may use Pydantic Kwargs/Slots
    "fastapi>=0.110",  # test-only: FastAPI contrib tests (Starlette TestClient)
    "httpx>=0.27",     # TestClient needs httpx
]
# Benchmark baselines (docs/design/benchmarking.md), pinned exactly so a bump is
# a deliberate re-baseline; skipped when absent (tests/conftest.py).
benchmark = [
    "django==6.0.6",
    "django-components==0.151.0",
    "jinja2==3.1.6",
]

[project.urls]
Homepage = "https://github.com/JuroOravec/citry/"
Changelog = "https://github.com/JuroOravec/citry/blob/main/CHANGELOG.md"
Issues = "https://github.com/JuroOravec/citry/issues"

[tool.setuptools.package-data]
# Non-Python files shipped inside the package: the type-checking marker and
# the client-side dependency manager (inlined into rendered pages, later also
# served over HTTP by the web integrations).
citry = ["py.typed", "extensions/dependencies/client/*.js"]
